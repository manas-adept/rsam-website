<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSAM</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="images/rsam-logo.PNG" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Racing+Sans+One&family=Pacifico&family=Bebas+Neue&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="page-watermark" aria-hidden="true">MORADABAD</div>
  <div id="app-navbar"></div>
  <div id="app-hero"></div>
  <div id="app-about"></div>
  <div id="app-officials"></div>
  <div id="app-news"></div>
  <div id="app-highlights"></div>
  <div id="app-latestvideo"></div>
  <div id="app-certificate"></div>
  <div id="app-connect"></div>
  <div id="app-footer"></div>

  <!-- Site config & static data -->
  <script src="config.js" defer></script>
  <script src="data/certificate.js" defer></script>

  <!-- Renderer — fetches content JSON files automatically -->
  <script src="render.js" defer></script>

  <!-- Animations & interactions -->
  <script src="script.js" defer></script>

  <!-- Netlify Identity widget (must load before the handler below) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Netlify Identity: redirect to admin after login -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

</body>
</html>
